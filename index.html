<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>DropGo Production</title>
<meta name="description" content="DropGo Production - concerts et événements live.">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
:root{--bg:#09090b;--card:#141419;--line:#2b2b34;--txt:#f5f1e8;--muted:#b9b2a5;--gold:#f5b84b;--pink:#ff4f87}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#2b1530 0,#09090b 38%,#050506 100%);color:var(--txt);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{width:min(1180px,92vw);margin:auto}.hero{min-height:70vh;display:grid;place-items:center;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:10%;background:linear-gradient(135deg,rgba(245,184,75,.24),rgba(255,79,135,.12));filter:blur(90px);border-radius:50%}.hero-inner{position:relative;text-align:center;padding:80px 0}.tag{letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-size:.8rem}.hero h1{font-size:clamp(3.2rem,10vw,8.5rem);line-height:.85;margin:18px 0;text-transform:uppercase}.hero p{font-size:clamp(1.1rem,2.2vw,1.6rem);color:var(--muted);max-width:780px;margin:0 auto 32px}.btn{display:inline-flex;gap:10px;align-items:center;padding:14px 20px;border:1px solid var(--line);border-radius:999px;color:var(--txt);text-decoration:none;background:rgba(255,255,255,.06);backdrop-filter:blur(10px)}.btn.primary{background:linear-gradient(135deg,var(--gold),var(--pink));color:#111;border:0;font-weight:800}.section{padding:60px 0}.section h2{font-size:clamp(2rem,5vw,4rem);margin:0 0 24px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border:1px solid var(--line);border-radius:28px;overflow:hidden;min-height:100%;box-shadow:0 25px 80px rgba(0,0,0,.25)}.poster{height:260px;background:linear-gradient(135deg,#1d1d25,#421a30);display:grid;place-items:center;color:rgba(255,255,255,.75);font-size:2.2rem;font-weight:900;text-align:center;padding:24px}.poster img{width:100%;height:100%;object-fit:cover}.card-body{padding:22px}.date{color:var(--gold);font-weight:800}.card h3{font-size:1.45rem;margin:10px 0}.meta{color:var(--muted);font-size:.95rem}.desc{color:#ddd6ca;line-height:1.55}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.pill{font-size:.8rem;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted)}footer{border-top:1px solid var(--line);padding:40px 0;color:var(--muted)}@media(max-width:900px){.grid{grid-template-columns:1fr}.poster{height:220px}.hero{min-height:62vh}}
</style>
</head>
<body>
<header class="hero"><div class="hero-inner wrap"><div class="tag">concerts · production · live</div><h1 id="heroTitle">DropGo</h1><p id="heroSubtitle"></p><a class="btn primary" href="#concerts">Voir les concerts</a></div></header>
<main class="wrap"><section class="section"><h2>Programmation</h2><p id="intro" class="desc"></p></section><section id="concerts" class="section"><div class="grid" id="grid"></div></section></main>
<footer><div class="wrap">DropGo Production · <span id="contact"></span></div></footer>
<script>
function formatDate(d){try{return new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}catch(e){return d}}
function initials(t){return t.split(/\s+/).slice(0,3).map(w=>w[0]).join('')}
fetch('/content/site.json',{cache:'no-store'}).then(r=>r.json()).then(data=>{
 document.title=data.hero_title||'DropGo Production';
 heroTitle.textContent=data.hero_title||'DropGo Production'; heroSubtitle.textContent=data.hero_subtitle||''; intro.textContent=data.intro||''; contact.textContent=data.contact_email||'';
 grid.innerHTML=(data.concerts||[]).map(c=>`<article class="card"><div class="poster">${c.image?`<img src="${c.image}" alt="${c.title}">`:initials(c.title)}</div><div class="card-body"><div class="date">${formatDate(c.date)} ${c.time?`· ${c.time}`:''}</div><h3>${c.title}</h3><div class="meta">${c.venue}</div><p class="desc">${c.description}</p><div class="actions"><span class="pill">${c.category||'Concert'}</span><span class="pill">${c.status||''}</span>${c.ticket_url&&c.ticket_url!='#'?`<a class="btn" href="${c.ticket_url}" target="_blank">Réserver</a>`:''}</div></div></article>`).join('');
});
if (window.netlifyIdentity) { window.netlifyIdentity.on('init', user => { if (!user && window.location.hash.includes('recovery_token')) { window.netlifyIdentity.open('login'); } }); window.netlifyIdentity.on('login', () => { if (window.location.hash.includes('recovery_token') || window.location.hash.includes('invite_token')) { document.location.href = '/admin/'; } }); }
</script>
</body>
</html>
